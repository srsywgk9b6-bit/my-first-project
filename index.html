<!DOCTYPE html>
<html>
<head>
    <title>我的第一个网页</title>
</head>

<body>

    <h1>你好，我正在用GitHub学编程</h1>

    <p>这是我人生第一个网页</p>

    <button onclick="alert('你点了按钮！')">
        点我
    </button>

    <hr>

    <button onclick="add()">
        计数 +1
    </button>

    <p id="a">0</p>

    <script>
        let count = 0;

        function add() {
            count = count + 1;
            document.getElementById("a").innerText = count;
        }
    </script>

</body>
</html>
